<header class="bg-white border-b border-gray-100 sticky top-0 z-30" dir="rtl">

  <!-- Main Header Row -->
  <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">

    <!-- Right: Logo -->
    <a routerLink="/home" class="text-2xl font-black text-gray-900 tracking-tight">
      متجرنا<sup class="text-sm font-bold">®</sup>
    </a>

    <!-- Left: Icons -->
    <div class="flex items-center gap-5">

      <ng-container *ngIf="currentUser; else guestLinks">

        <!-- Customer Icons -->
        <ng-container *ngIf="!isAdmin()">

          <button (click)="goToCart()" class="relative text-gray-700 hover:text-gray-900 transition-colors" title="السلة">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" />
            </svg>
            <span *ngIf="cartCount > 0"
                  class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-xs w-4 h-4 rounded-full flex items-center justify-center font-medium">
              {{ cartCount }}
            </span>
          </button>

          <button class="text-gray-700 hover:text-gray-900 transition-colors" title="المفضلة">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
            </svg>
          </button>

          <a routerLink="/orders" class="text-gray-700 hover:text-gray-900 transition-colors" title="طلباتي">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
            </svg>
          </a>

        </ng-container>

        <!-- Admin Icons -->
        <ng-container *ngIf="isAdmin()">

          <a routerLink="/admin/dashboard" class="text-gray-700 hover:text-gray-900 transition-colors" title="Dashboard">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
            </svg>
          </a>

          <a routerLink="/admin/products" class="text-gray-700 hover:text-gray-900 transition-colors" title="المنتجات">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z" />
            </svg>
          </a>

          <a routerLink="/admin/branches" class="text-gray-700 hover:text-gray-900 transition-colors" title="الفروع">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.015a3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72L4.318 3.44A1.5 1.5 0 015.378 3h13.243a1.5 1.5 0 011.06.44l1.19 1.189a3 3 0 01-.621 4.72m-13.5 8.65h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .415.336.75.75.75z" />
            </svg>
          </a>

          <a routerLink="/admin/orders" class="text-gray-700 hover:text-gray-900 transition-colors" title="الطلبات">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
            </svg>
          </a>

        </ng-container>

        <!-- Search -->
        <button class="text-gray-700 hover:text-gray-900 transition-colors" title="بحث">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803 7.5 7.5 0 0016.803 15.803z" />
          </svg>
        </button>

        <!-- Logout -->
        <button (click)="logout()" class="text-gray-700 hover:text-red-500 transition-colors" title="خروج">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
          </svg>
        </button>

      </ng-container>

      <!-- Guest Links -->
      <ng-template #guestLinks>
        <a routerLink="/login" class="text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">دخول</a>
        <a routerLink="/register"
           class="bg-gray-900 text-white px-4 py-1.5 rounded-lg hover:bg-gray-700 text-sm font-medium transition-all">
          تسجيل
        </a>
      </ng-template>

    </div>
  </div>

  <!-- Branches Bar — Customer Only -->
  <div *ngIf="currentUser && !isAdmin()" class="border-t border-gray-100">
    <div class="max-w-6xl mx-auto px-6 h-10 flex items-center gap-1 overflow-x-auto hide-scrollbar">
      <button *ngFor="let branch of branches"
              (click)="selectBranch(branch)"
              class="px-4 py-1 rounded-full text-xs font-medium whitespace-nowrap transition-all"
              [class.bg-gray-900]="selectedBranch?.id === branch.id"
              [class.text-white]="selectedBranch?.id === branch.id"
              [class.text-gray-500]="selectedBranch?.id !== branch.id">
        {{ branch.name }}
      </button>
    </div>
  </div>

</header>

<style>
.hide-scrollbar::-webkit-scrollbar { display: none; }
.hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
