<div class="flex min-h-screen bg-slate-50" dir="rtl">

  <!-- Sidebar -->
  <aside class="w-60 bg-white border-l border-slate-200 flex flex-col fixed h-full">
    <div class="p-5 border-b border-slate-100">
      <h1 class="text-base font-bold text-slate-700">🛒 ECommerce</h1>
      <p class="text-xs text-slate-400 mt-0.5">لوحة الإدارة</p>
    </div>

    <nav class="flex-1 p-3 space-y-0.5">
      <a routerLink="/admin/dashboard" routerLinkActive="bg-slate-100 text-slate-800"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition-all text-sm">
        <span class="text-base">📊</span> الرئيسية
      </a>
      <a routerLink="/admin/branches" routerLinkActive="bg-slate-100 text-slate-800"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition-all text-sm">
        <span class="text-base">🏪</span> الفروع
      </a>
      <a routerLink="/admin/categories" routerLinkActive="bg-slate-100 text-slate-800"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition-all text-sm">
        <span class="text-base">📂</span> الكاتيجوريز
      </a>
      <a routerLink="/admin/products" routerLinkActive="bg-slate-100 text-slate-800"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition-all text-sm">
        <span class="text-base">🛍️</span> المنتجات
      </a>
      <a routerLink="/admin/orders" routerLinkActive="bg-slate-100 text-slate-800"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition-all text-sm">
        <span class="text-base">📦</span> الأوردرات
      </a>
    </nav>

    <div class="p-3 border-t border-slate-100">
      <button (click)="logout()"
              class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-red-50 hover:text-red-500 transition-all text-sm">
        <span class="text-base">🚪</span> تسجيل الخروج
      </button>
    </div>
  </aside>

  <!-- Content -->
  <main class="flex-1 mr-60 p-8">
    <router-outlet />
  </main>

</div>
