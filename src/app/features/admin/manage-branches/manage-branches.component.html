<div dir="rtl">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-xl font-bold text-slate-700">الفروع</h1>
      <p class="text-sm text-slate-400 mt-0.5">إدارة فروع المتجر</p>
    </div>
    <button (click)="openAdd()"
            class="bg-slate-700 text-white px-4 py-2 rounded-lg text-sm hover:bg-slate-800 transition-all">
      + إضافة فرع
    </button>
  </div>

  <!-- Modal -->
  <div *ngIf="showForm"
       class="fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-md mx-4" dir="rtl">

      <h2 class="text-base font-bold text-slate-700 mb-5">
        {{ editingBranch ? 'تعديل الفرع' : 'إضافة فرع جديد' }}
      </h2>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">اسم الفرع</label>
          <input [(ngModel)]="form.name" type="text" placeholder="Stories"
                 class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">موقع الفرع</label>
          <input [(ngModel)]="form.location" type="text" placeholder="القاهرة، مدينة نصر"
                 class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300"/>
        </div>
        <div class="flex items-center gap-2">
          <input [(ngModel)]="form.isDefault" type="checkbox" id="isDefault"
                 class="w-4 h-4 accent-slate-700"/>
          <label for="isDefault" class="text-sm text-slate-600">فرع رئيسي</label>
        </div>
      </div>

      <div class="flex gap-3 mt-6">
        <button (click)="save()"
                class="flex-1 bg-slate-700 text-white py-2 rounded-lg text-sm hover:bg-slate-800 transition-all">
          {{ editingBranch ? 'حفظ التعديلات' : 'إضافة' }}
        </button>
        <button (click)="cancel()"
                class="flex-1 bg-slate-100 text-slate-600 py-2 rounded-lg text-sm hover:bg-slate-200 transition-all">
          إلغاء
        </button>
      </div>

    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex justify-center py-16">
    <div class="w-6 h-6 border-2 border-slate-300 border-t-slate-600 rounded-full animate-spin"></div>
  </div>

  <!-- Table -->
  <div *ngIf="!loading" class="bg-white border border-slate-100 rounded-xl overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-slate-50 border-b border-slate-100">
        <tr>
          <th class="text-right px-5 py-3 text-xs font-medium text-slate-500">#</th>
          <th class="text-right px-5 py-3 text-xs font-medium text-slate-500">الاسم</th>
          <th class="text-right px-5 py-3 text-xs font-medium text-slate-500">الموقع</th>
          <th class="text-right px-5 py-3 text-xs font-medium text-slate-500">الحالة</th>
          <th class="text-right px-5 py-3 text-xs font-medium text-slate-500">إجراءات</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-50">
        <tr *ngFor="let branch of branches" class="hover:bg-slate-50 transition-colors">
          <td class="px-5 py-3 text-slate-400">{{ branch.id }}</td>
          <td class="px-5 py-3 font-medium text-slate-700">{{ branch.name }}</td>
          <td class="px-5 py-3 text-slate-500">{{ branch.location }}</td>
          <td class="px-5 py-3">
            <span *ngIf="branch.isDefault"
                  class="bg-emerald-50 text-emerald-700 text-xs px-2 py-0.5 rounded-full">رئيسي</span>
            <span *ngIf="!branch.isDefault"
                  class="bg-slate-100 text-slate-500 text-xs px-2 py-0.5 rounded-full">فرعي</span>
          </td>
          <td class="px-5 py-3">
            <div class="flex gap-2">
              <button (click)="openEdit(branch)"
                      class="text-xs text-slate-500 hover:text-slate-700 bg-slate-100 px-3 py-1 rounded-lg transition-all">
                تعديل
              </button>
              <button (click)="delete(branch.id)"
                      class="text-xs text-red-400 hover:text-red-600 bg-red-50 px-3 py-1 rounded-lg transition-all">
                حذف
              </button>
            </div>
          </td>
        </tr>

        <tr *ngIf="branches.length === 0">
          <td colspan="5" class="text-center py-12 text-slate-400 text-sm">
            مفيش فروع متضافة
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
