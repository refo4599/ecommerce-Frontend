<div dir="rtl">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-xl font-bold text-slate-700">المنتجات</h1>
      <p class="text-sm text-slate-400 mt-0.5">إدارة منتجات المتجر</p>
    </div>
    <button (click)="openAdd()"
            class="bg-slate-700 text-white px-4 py-2 rounded-lg text-sm hover:bg-slate-800 transition-all">
      + إضافة منتج
    </button>
  </div>

  <!-- Product Form Modal -->
  <div *ngIf="showForm"
       class="fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-lg mx-4 max-h-screen overflow-y-auto" dir="rtl">

      <h2 class="text-base font-bold text-slate-700 mb-5">
        {{ editingProduct ? 'تعديل المنتج' : 'إضافة منتج جديد' }}
      </h2>

      <div class="space-y-4">

        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">اسم المنتج</label>
          <input [(ngModel)]="form.name" type="text" placeholder="برجر / Burger"
                 class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300"/>
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">
            الوصف <span class="text-slate-300">(اختياري)</span>
          </label>
          <textarea [(ngModel)]="form.description" rows="2" placeholder="وصف مختصر..."
                    class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300 resize-none"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">السعر (ج.م)</label>
            <input [(ngModel)]="form.basePrice" type="number" placeholder="0"
                   class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300"/>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">الكاتيجوري</label>
            <select [(ngModel)]="form.categoryId"
                    class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300">
              <option value="0" disabled>اختار كاتيجوري</option>
              <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
            </select>
          </div>
        </div>

        <!-- Image Upload -->
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">
            صورة المنتج <span class="text-slate-300">(اختياري)</span>
          </label>
          <div *ngIf="previewUrl"
               class="w-full h-36 rounded-lg overflow-hidden mb-2 border border-slate-100">
            <img [src]="previewUrl" class="w-full h-full object-cover"/>
          </div>
          <label class="flex items-center gap-2 w-full border border-dashed border-slate-300
                        rounded-lg px-3 py-3 text-sm text-slate-400 cursor-pointer
                        hover:border-slate-400 hover:bg-slate-50 transition-all">
            <span *ngIf="!uploading">📁 اختار صورة من جهازك</span>
            <span *ngIf="uploading" class="flex items-center gap-2">
              <span class="w-4 h-4 border-2 border-slate-300 border-t-slate-600 rounded-full animate-spin inline-block"></span>
              جاري الرفع...
            </span>
            <input type="file" accept="image/*" class="hidden"
                   (change)="onFileSelected($event)" [disabled]="uploading"/>
          </label>
        </div>

      </div>

      <div class="flex gap-3 mt-6">
        <button (click)="save()" [disabled]="uploading || !form.name"
                class="flex-1 bg-slate-700 text-white py-2 rounded-lg text-sm hover:bg-slate-800 transition-all disabled:opacity-50">
          {{ editingProduct ? 'حفظ التعديلات' : 'إضافة' }}
        </button>
        <button (click)="cancel()"
                class="flex-1 bg-slate-100 text-slate-600 py-2 rounded-lg text-sm hover:bg-slate-200 transition-all">
          إلغاء
        </button>
      </div>

    </div>
  </div>

  <!-- Assign Form Modal -->
  <div *ngIf="showAssignForm"
       class="fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-md mx-4" dir="rtl">

      <h2 class="text-base font-bold text-slate-700 mb-5">تعيين المنتج لفرع</h2>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">الفرع</label>
          <select [(ngModel)]="assignForm.branchId"
                  class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300">
            <option *ngFor="let branch of branches" [value]="branch.id">{{ branch.name }}</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">الكمية في الستوك</label>
          <input [(ngModel)]="assignForm.stock" type="number" placeholder="0"
                 class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">
            سعر خاص للفرع <span class="text-slate-300">(اختياري)</span>
          </label>
          <input [(ngModel)]="assignForm.priceOverride" type="number"
                 placeholder="اتركه فاضي لو نفس السعر"
                 class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300"/>
        </div>
      </div>

      <div class="flex gap-3 mt-6">
        <button (click)="saveAssign()"
                class="flex-1 bg-slate-700 text-white py-2 rounded-lg text-sm hover:bg-slate-800 transition-all">
          تعيين
        </button>
        <button (click)="cancel()"
                class="flex-1 bg-slate-100 text-slate-600 py-2 rounded-lg text-sm hover:bg-slate-200 transition-all">
          إلغاء
        </button>
      </div>

    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex justify-center py-16">
    <div class="w-6 h-6 border-2 border-slate-300 border-t-slate-600 rounded-full animate-spin"></div>
  </div>

  <!-- Table -->
  <div *ngIf="!loading" class="bg-white border border-slate-100 rounded-xl overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-slate-50 border-b border-slate-100">
        <tr>
          <th class="text-right px-5 py-3 text-xs font-medium text-slate-500">المنتج</th>
          <th class="text-right px-5 py-3 text-xs font-medium text-slate-500">الكاتيجوري</th>
          <th class="text-right px-5 py-3 text-xs font-medium text-slate-500">السعر</th>
          <th class="text-right px-5 py-3 text-xs font-medium text-slate-500">الحالة</th>
          <th class="text-right px-5 py-3 text-xs font-medium text-slate-500">إجراءات</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-50">
        <tr *ngFor="let product of products" class="hover:bg-slate-50 transition-colors">
          <td class="px-5 py-3">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 bg-slate-100 rounded-lg overflow-hidden flex-shrink-0 flex items-center justify-center">
                <img *ngIf="product.imageUrl" [src]="product.imageUrl"
                     class="w-full h-full object-cover"/>
                <span *ngIf="!product.imageUrl" class="text-lg">🛍️</span>
              </div>
              <div>
                <p class="font-medium text-slate-700">{{ product.name }}</p>
                <p *ngIf="product.description"
                   class="text-xs text-slate-400 line-clamp-1">{{ product.description }}</p>
              </div>
            </div>
          </td>
          <td class="px-5 py-3 text-slate-500 text-xs">
            {{ product.category?.name ?? '—' }}
          </td>
          <td class="px-5 py-3 font-medium text-slate-700">
            {{ product.basePrice }} ج.م
          </td>
          <td class="px-5 py-3">
            <span *ngIf="product.isActive"
                  class="bg-emerald-50 text-emerald-700 text-xs px-2 py-0.5 rounded-full">نشط</span>
            <span *ngIf="!product.isActive"
                  class="bg-red-50 text-red-500 text-xs px-2 py-0.5 rounded-full">محذوف</span>
          </td>
          <td class="px-5 py-3">
            <div class="flex gap-2">
              <button (click)="openAssign(product)"
                      class="text-xs text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg hover:bg-emerald-100 transition-all">
                تعيين لفرع
              </button>
              <button (click)="openEdit(product)"
                      class="text-xs text-slate-500 bg-slate-100 px-3 py-1 rounded-lg hover:bg-slate-200 transition-all">
                تعديل
              </button>
              <button (click)="delete(product.id)"
                      class="text-xs text-red-400 bg-red-50 px-3 py-1 rounded-lg hover:bg-red-100 transition-all">
                حذف
              </button>
            </div>
          </td>
        </tr>

        <tr *ngIf="products.length === 0">
          <td colspan="5" class="text-center py-12 text-slate-400 text-sm">
            مفيش منتجات متضافة
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
