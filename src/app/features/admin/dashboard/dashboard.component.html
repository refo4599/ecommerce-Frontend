<div dir="rtl">

  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-xl font-bold text-slate-700">لوحة التحكم</h1>
      <p class="text-sm text-slate-400 mt-0.5">مرحباً، أدمن 👋</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg px-4 py-2 text-sm text-slate-500">
      {{ today | date:'EEEE, d MMMM y' }}
    </div>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">

    <div class="bg-white border border-slate-100 rounded-xl p-5">
      <div class="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center text-sm mb-3">🏪</div>
      <p class="text-2xl font-bold text-slate-700">{{ branchCount }}</p>
      <p class="text-sm text-slate-400 mt-1">فروع نشطة</p>
    </div>

    <div class="bg-white border border-slate-100 rounded-xl p-5">
      <div class="w-8 h-8 bg-emerald-50 rounded-lg flex items-center justify-center text-sm mb-3">🛍️</div>
      <p class="text-2xl font-bold text-slate-700">{{ productCount }}</p>
      <p class="text-sm text-slate-400 mt-1">منتجات</p>
    </div>

    <div class="bg-white border border-slate-100 rounded-xl p-5">
      <div class="w-8 h-8 bg-amber-50 rounded-lg flex items-center justify-center text-sm mb-3">📦</div>
      <p class="text-2xl font-bold text-slate-700">0</p>
      <p class="text-sm text-slate-400 mt-1">أوردرات اليوم</p>
    </div>

    <div class="bg-white border border-slate-100 rounded-xl p-5">
      <div class="w-8 h-8 bg-violet-50 rounded-lg flex items-center justify-center text-sm mb-3">💰</div>
      <p class="text-2xl font-bold text-slate-700">0</p>
      <p class="text-sm text-slate-400 mt-1">إيرادات (ج.م)</p>
    </div>

  </div>

  <!-- Quick Actions -->
  <div class="bg-white border border-slate-100 rounded-xl p-6">
    <h2 class="text-sm font-bold text-slate-600 mb-4 uppercase tracking-wide">إجراءات سريعة</h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">

      <a routerLink="/admin/branches"
         class="flex flex-col items-center gap-2 p-4 rounded-xl border border-slate-100 hover:border-blue-200 hover:bg-blue-50 transition-all block text-center">
        <span class="text-xl">🏪</span>
        <span class="text-xs text-slate-500">إضافة فرع</span>
      </a>

      <a routerLink="/admin/categories"
         class="flex flex-col items-center gap-2 p-4 rounded-xl border border-slate-100 hover:border-emerald-200 hover:bg-emerald-50 transition-all block text-center">
        <span class="text-xl">📂</span>
        <span class="text-xs text-slate-500">إضافة كاتيجوري</span>
      </a>

      <a routerLink="/admin/products"
         class="flex flex-col items-center gap-2 p-4 rounded-xl border border-slate-100 hover:border-amber-200 hover:bg-amber-50 transition-all block text-center">
        <span class="text-xl">🛍️</span>
        <span class="text-xs text-slate-500">إضافة منتج</span>
      </a>

      <a routerLink="/admin/orders"
         class="flex flex-col items-center gap-2 p-4 rounded-xl border border-slate-100 hover:border-violet-200 hover:bg-violet-50 transition-all block text-center">
        <span class="text-xl">📦</span>
        <span class="text-xs text-slate-500">عرض الأوردرات</span>
      </a>

    </div>
  </div>

</div>
