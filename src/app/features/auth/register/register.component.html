<div class="min-h-screen bg-gray-50 flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-md">

    <!-- Title -->
    <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">
      إنشاء حساب جديد
    </h2>

    <!-- Error -->
    <div *ngIf="error"
         class="bg-red-50 text-red-600 text-sm px-4 py-3 rounded-lg mb-4">
      {{ error }}
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()">

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          الاسم
        </label>
        <input
          type="text"
          [(ngModel)]="name"
          name="name"
          required
          placeholder="اسمك هنا"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5
                 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"/>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          البريد الإلكتروني
        </label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          placeholder="example@email.com"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5
                 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"/>
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          كلمة المرور
        </label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          placeholder="••••••••"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5
                 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"/>
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-blue-600 text-white py-2.5 rounded-lg
               hover:bg-blue-700 font-medium text-sm
               disabled:opacity-50 disabled:cursor-not-allowed">
        {{ loading ? 'جاري التسجيل...' : 'تسجيل' }}
      </button>

    </form>

    <!-- Login Link -->
    <p class="text-center text-sm text-gray-500 mt-4">
      عندك حساب؟
      <a routerLink="/login" class="text-blue-600 hover:underline font-medium">
        سجل دخول
      </a>
    </p>

  </div>
</div>
