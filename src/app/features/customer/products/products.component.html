<div class="min-h-screen bg-white" dir="rtl">

  <!-- Error Toast -->
  <div *ngIf="errorMessage"
       class="fixed top-5 left-1/2 -translate-x-1/2 z-50
              bg-red-50 border border-red-100 text-red-600
              px-5 py-3 rounded-2xl shadow-md text-sm font-medium">
    {{ errorMessage }}
  </div>

  <!-- Header -->
  <header class="bg-white border-b border-gray-100 sticky top-0 z-30">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center gap-3">
      <button (click)="goBack()"
              class="text-gray-400 hover:text-gray-700 transition-colors text-xl">
        ←
      </button>
      <h1 class="text-base font-bold text-gray-800 flex-1">
        {{ categoryId ? categoryName : 'كل المنتجات' }}
      </h1>
      <button (click)="goToCart()"
              class="relative text-gray-700 hover:text-gray-900 transition-colors">
        <span class="text-xl">🛍️</span>
        <span *ngIf="cartCount > 0"
              class="absolute -top-1 -left-1 bg-red-500 text-white text-xs w-4 h-4 rounded-full flex items-center justify-center">
          {{ cartCount }}
        </span>
      </button>
    </div>
  </header>

  <!-- Loading -->
  <div *ngIf="loading" class="flex justify-center items-center h-64">
    <div class="w-8 h-8 border-2 border-gray-200 border-t-gray-800 rounded-full animate-spin"></div>
  </div>

  <div *ngIf="!loading" class="max-w-6xl mx-auto px-4 py-6">

    <p class="text-xs text-gray-400 mb-4">{{ products.length }} منتج</p>

    <!-- Products Grid -->
    <div *ngIf="products.length > 0"
         class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">

      <div *ngFor="let product of products"
           class="group bg-white border border-gray-100 rounded-xl overflow-hidden
                  hover:border-gray-300 hover:shadow-sm transition-all">

        <div class="relative h-52 bg-gray-50 overflow-hidden">
          <img *ngIf="product.imageUrl"
               [src]="product.imageUrl"
               [alt]="product.name"
               class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"/>
          <div *ngIf="!product.imageUrl"
               class="w-full h-full flex items-center justify-center text-5xl text-gray-200">
            🛍️
          </div>

          <div *ngIf="product.stock === 0"
               class="absolute inset-0 bg-white bg-opacity-70 flex items-center justify-center">
            <span class="text-xs font-medium text-red-500 bg-white border border-red-100 px-3 py-1 rounded-full">
              نفذت الكمية
            </span>
          </div>

          <div *ngIf="product.stock > 0 && product.stock <= 5"
               class="absolute top-2 right-2 bg-orange-500 text-white text-xs px-2 py-0.5 rounded-full">
            آخر {{ product.stock }} قطع
          </div>
        </div>

        <div class="p-3">
          <h3 class="text-sm font-medium text-gray-800 line-clamp-2 leading-snug mb-2">
            {{ product.nameAr || product.name }}
          </h3>
          <p class="text-base font-bold text-gray-900 mb-2">
            {{ product.effectivePrice | number:'1.0-0' }} ج.م
          </p>

          <button (click)="addToCart(product)"
                  [disabled]="product.stock === 0"
                  class="w-full py-2 rounded-lg text-sm font-medium transition-all"
                  [class.bg-gray-900]="addedProductId !== product.id && product.stock > 0"
                  [class.text-white]="addedProductId !== product.id && product.stock > 0"
                  [class.bg-green-500]="addedProductId === product.id"
                  [class.bg-gray-100]="product.stock === 0"
                  [class.text-gray-400]="product.stock === 0"
                  [class.cursor-not-allowed]="product.stock === 0">
            <span *ngIf="addedProductId !== product.id">
              {{ product.stock === 0 ? 'غير متاح' : 'أضف للسلة' }}
            </span>
            <span *ngIf="addedProductId === product.id">
              ✓ تم الإضافة
            </span>
          </button>
        </div>
      </div>
    </div>

    <!-- Empty -->
    <div *ngIf="products.length === 0" class="text-center py-20">
      <p class="text-4xl mb-3">🛍️</p>
      <p class="text-gray-400 text-sm">مفيش منتجات في هذا القسم</p>
    </div>

  </div>
</div>
