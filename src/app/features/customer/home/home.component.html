<div class="min-h-screen bg-white" dir="rtl">

  <!-- Header -->
  <header class="bg-white border-b border-gray-100 sticky top-0 z-30">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="text-base font-bold text-gray-900">🛒 متجرنا</div>

      <div class="flex items-center gap-1 overflow-x-auto hide-scrollbar">
        <button *ngFor="let branch of branches"
                (click)="selectBranch(branch)"
                class="px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all"
                [class.bg-gray-900]="selectedBranch?.id === branch.id"
                [class.text-white]="selectedBranch?.id === branch.id"
                [class.text-gray-500]="selectedBranch?.id !== branch.id">
          {{ branch.name }}
        </button>
      </div>

      <div class="flex items-center gap-3">
        <button (click)="goToCart()"
                class="relative text-gray-700 hover:text-gray-900 transition-colors">
          <span class="text-xl">🛍️</span>
          <span *ngIf="cartCount > 0"
                class="absolute -top-1 -left-1 bg-red-500 text-white text-xs w-4 h-4 rounded-full flex items-center justify-center">
            {{ cartCount }}
          </span>
        </button>
        <button (click)="logout()"
                class="text-xs text-gray-400 hover:text-gray-600 transition-colors">
          خروج
        </button>
      </div>
    </div>
  </header>

  <!-- Loading -->
  <div *ngIf="loading" class="flex justify-center items-center h-64">
    <div class="w-8 h-8 border-2 border-gray-200 border-t-gray-800 rounded-full animate-spin"></div>
  </div>

  <div *ngIf="!loading" class="max-w-6xl mx-auto px-4 py-8">

    <!-- All Products Button -->
    <div class="mb-8">
      <button (click)="selectCategory(null)"
              class="w-full bg-gray-900 text-white rounded-2xl py-4 text-base font-bold
                     hover:bg-gray-700 transition-all flex items-center justify-center gap-2">
        <span>🛍️</span>
        <span>تصفح كل المنتجات</span>
      </button>
    </div>

    <!-- Categories -->
    <div *ngIf="categories.length > 0">
      <h2 class="text-lg font-bold text-gray-800 mb-4">تسوق حسب القسم</h2>

      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
        <button *ngFor="let cat of categories"
                (click)="selectCategory(cat.id)"
                class="group relative rounded-2xl overflow-hidden border border-gray-100
                       hover:border-gray-300 hover:shadow-md transition-all aspect-square
                       bg-gray-50 flex flex-col items-center justify-center gap-3">

          <!-- Image -->
          <div *ngIf="cat.imageUrl"
               class="absolute inset-0">
            <img [src]="cat.imageUrl"
                 [alt]="cat.nameAr"
                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"/>
            <div class="absolute inset-0 bg-black bg-opacity-30 group-hover:bg-opacity-20 transition-all"></div>
          </div>

          <!-- No Image -->
          <div *ngIf="!cat.imageUrl"
               class="text-5xl text-gray-300">
            🏷️
          </div>

          <!-- Name -->
          <div class="relative z-10 text-center px-3">
            <p class="font-bold text-sm"
               [class.text-white]="cat.imageUrl"
               [class.text-gray-800]="!cat.imageUrl">
              {{ cat.nameAr || cat.name }}
            </p>
          </div>

        </button>
      </div>
    </div>

    <!-- No Categories -->
    <div *ngIf="categories.length === 0" class="text-center py-20">
      <p class="text-4xl mb-3">🏷️</p>
      <p class="text-gray-400 text-sm">مفيش أقسام متاحة دلوقتي</p>
    </div>

  </div>
</div>

<style>
.hide-scrollbar::-webkit-scrollbar { display: none; }
.hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
